<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Meeting Canvas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#07090f;color:#c8d8e8;font-family:'Inter',sans-serif;min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px currentColor}50%{opacity:0.5;box-shadow:0 0 2px currentColor}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes ripple{0%{transform:scale(1);opacity:0.6}100%{transform:scale(2.2);opacity:0}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{border-color:#00d4ff33}50%{border-color:#00d4ff88}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0d16}::-webkit-scrollbar-thumb{background:#1a2a3a;border-radius:2px}

.app{display:grid;grid-template-columns:320px 1fr;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sb{background:#080b14;border-right:1px solid #0d1827;display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:16px 18px;border-bottom:1px solid #0d1827;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.dot{width:8px;height:8px;border-radius:50%;background:#00d4ff;color:#00d4ff;animation:pulse 2s ease-in-out infinite;}
.logo-text{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;letter-spacing:3px;color:#e8f4ff;}
.live-badge{margin-left:auto;font-size:9px;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;background:#ff003322;color:#ff4444;border:1px solid #ff003344;display:none;}
.live-badge.active{display:block;animation:blink 1.5s ease-in-out infinite;}
.lbl{font-size:9px;color:#2a5a6a;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;margin-bottom:5px;}
.api-in{background:#060810;border:1px solid #0d1827;border-radius:6px;padding:8px 12px;color:#c8d8e8;font-family:'IBM Plex Mono',monospace;font-size:11px;width:100%;}
.api-in:focus{outline:none;border-color:#00d4ff30;}
.api-in::placeholder{color:#1a3a4a;}

.sb-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* Mic controls */
.mic-zone{padding:14px 18px;border-bottom:1px solid #0d1827;flex-shrink:0;}
.mic-btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.mic-btn.idle{background:#0d1827;color:#3a6a7a;border:1px solid #1a2a3a;}
.mic-btn.idle:hover{background:#1a2a3a;color:#00d4ff;border-color:#00d4ff33;}
.mic-btn.recording{background:#ff003315;color:#ff4444;border:1px solid #ff003344;animation:glow 1.5s ease-in-out infinite;}
.mic-ripple{position:absolute;top:50%;left:50%;width:100%;height:100%;border-radius:50%;background:rgba(255,0,51,0.15);transform:translate(-50%,-50%) scale(0);pointer-events:none;}
.mic-btn.recording .mic-ripple{animation:ripple 1.5s ease-out infinite;}
.stop-btn{width:100%;padding:10px;background:transparent;border:1px solid #1a2a3a;border-radius:7px;color:#3a6a7a;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;margin-top:8px;transition:all 0.15s;display:none;}
.stop-btn:hover{border-color:#ff444433;color:#ff6060;}
.stop-btn.visible{display:block;}

/* Status bar */
.status-bar{padding:10px 18px;border-bottom:1px solid #0d1827;flex-shrink:0;display:flex;align-items:center;gap:8px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#1a3a4a;flex-shrink:0;transition:all 0.3s;}
.status-dot.listening{background:#00ff88;box-shadow:0 0 6px #00ff88;}
.status-dot.analyzing{background:#ffd93d;box-shadow:0 0 6px #ffd93d;}
.status-dot.idle{background:#1a3a4a;}
.status-text{font-size:10px;color:#2a6a7a;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;flex:1;}
.next-update{font-size:9px;color:#1a4a5a;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;}

/* Transcript */
.tx-zone{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:14px 18px;}
.tx-scroll{flex:1;overflow-y:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.8;color:#3a6a7a;}
.tx-final{color:#6a9ab0;}
.tx-interim{color:#2a5a6a;font-style:italic;}
.tx-placeholder{color:#1a3a4a;font-style:italic;}
.tx-timestamp{color:#1a3a4a;font-size:9px;letter-spacing:1px;display:block;margin-top:8px;margin-bottom:2px;}

/* Analyze now */
.analyze-now{margin:10px 18px;padding:9px;background:transparent;border:1px solid #0d1827;border-radius:6px;color:#2a6a7a;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all 0.15s;letter-spacing:1px;flex-shrink:0;}
.analyze-now:hover:not(:disabled){border-color:#00d4ff33;color:#00d4ff;}
.analyze-now:disabled{opacity:0.4;cursor:not-allowed;}

/* Error */
.err-box{margin:0 18px 12px;color:#ff6060;font-size:10px;padding:8px 12px;background:rgba(255,80,80,0.06);border:1px solid rgba(255,80,80,0.15);border-radius:6px;display:none;flex-shrink:0;}

/* ── CANVAS ── */
.cv{overflow-y:auto;display:flex;flex-direction:column;background:#07090f;}

/* ── LIVE SUMMARY (sticky top zone) ── */
.live-top{flex-shrink:0;background:#07090f;border-bottom:1px solid #0d1827;padding:20px 28px;position:sticky;top:0;z-index:10;transition:all 0.4s;}
.live-top.has-content{background:#08090f;}
.lt-waiting{display:flex;align-items:center;gap:12px;padding:20px 0;opacity:0.3;}
.lt-waiting .wi{font-size:40px;}
.lt-waiting p{font-size:11px;color:#4a7a9b;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;}
.lt-content{display:none;}
.lt-content.visible{display:block;animation:fadeUp 0.35s ease;}
.lt-topic-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.lt-topic-label{font-size:9px;color:#2a5a6a;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;}
.lt-topic{font-size:18px;font-weight:700;color:#e8f4ff;line-height:1.3;flex:1;}
.lt-updated{font-size:9px;color:#1a4a5a;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.lt-eli5{font-size:14px;color:#9ab8cc;line-height:1.7;margin-bottom:12px;font-weight:300;}
.lt-takeaways{display:flex;flex-wrap:wrap;gap:8px;}
.lt-tk{padding:6px 12px;background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.15);border-radius:20px;font-size:12px;color:#90d8a8;line-height:1.4;}
.lt-tk.hl{background:rgba(0,255,180,0.1);border-color:rgba(0,255,180,0.3);color:#c0ffe8;font-weight:600;}
.updating-indicator{display:none;align-items:center;gap:8px;margin-top:10px;}
.updating-indicator.visible{display:flex;}
.upd-spinner{width:12px;height:12px;border:2px solid #0d1827;border-top:2px solid #ffd93d;border-radius:50%;animation:spin 0.7s linear infinite;}
.upd-text{font-size:9px;color:#3a6a7a;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;}

/* ── DETAIL SECTIONS (scrollable history) ── */
.cv-sections{flex:1;padding:20px 28px;display:flex;flex-direction:column;gap:0;}
.section-timestamp{display:flex;align-items:center;gap:12px;margin:16px 0 12px;opacity:0.5;}
.section-timestamp::before,.section-timestamp::after{content:'';flex:1;height:1px;background:#0d1827;}
.section-timestamp span{font-size:9px;color:#2a5a6a;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}

/* Visual sections — same as before */
.vs{border:1px solid #0d1827;border-radius:12px;overflow:hidden;margin-bottom:18px;animation:fadeUp 0.4s ease both;}
.vs-head{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid #0d1827;}
.vs-icon{font-size:15px;}
.vs-title{font-size:10px;font-weight:700;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;}
.vs-chip{margin-left:auto;font-size:9px;padding:2px 7px;border-radius:8px;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;}
.vb{padding:18px 20px;}
.tb{padding:14px 20px;border-top:1px solid #0d1827;}
.tb-lbl{font-size:9px;color:#2a5a6a;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;margin-bottom:6px;}
.tb-body{font-size:13px;color:#7a9aaa;line-height:1.75;}

/* Visual type styles */
.tk-row{display:flex;align-items:stretch;margin-bottom:8px;border-radius:7px;overflow:hidden;border:1px solid rgba(0,255,136,0.1);}
.tk-num{background:rgba(0,255,136,0.07);padding:10px 12px;font-size:11px;color:#00ff88;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;border-right:1px solid rgba(0,255,136,0.1);min-width:40px;justify-content:center;font-weight:700;}
.tk-text{padding:10px 13px;font-size:12px;color:#c8e8d8;line-height:1.6;flex:1;display:flex;align-items:center;}
.tk-row.hl .tk-num{background:rgba(0,255,180,0.12);color:#00ffaa;}
.tk-row.hl .tk-text{color:#c8ffec;font-weight:600;}
.diagram-wrap{background:#060810;border-radius:8px;padding:14px;overflow:auto;}
.diagram-wrap svg{max-width:100%;}
.diagram-cap{font-size:10px;color:#2a6a7a;font-style:italic;margin-top:8px;}
.eli-body{font-size:15px;color:#ddd0f0;line-height:1.8;font-weight:300;}
.eli-analogy{margin-top:12px;padding:12px 16px;background:rgba(199,125,255,0.06);border-left:3px solid #c77dff;border-radius:0 8px 8px 0;font-size:12px;color:#b89ad8;line-height:1.6;font-style:italic;}
.eli-analogy strong{color:#c77dff;font-style:normal;font-size:9px;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:4px;}
.bs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;}
.bs-card{padding:12px 14px;background:rgba(255,140,107,0.05);border:1px solid rgba(255,140,107,0.15);border-radius:9px;}
.bs-q{font-size:12px;font-weight:600;color:#ffb89a;margin-bottom:4px;display:flex;gap:7px;align-items:flex-start;line-height:1.4;}
.bs-q::before{content:"?";font-family:'IBM Plex Mono',monospace;font-size:9px;color:#ff8c6b;background:rgba(255,140,107,0.15);padding:1px 5px;border-radius:3px;flex-shrink:0;margin-top:2px;}
.bs-a{font-size:11px;color:#c89a80;line-height:1.55;padding-left:22px;}
.mm-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.mm-center{padding:10px 24px;border-radius:28px;font-size:14px;font-weight:700;text-align:center;}
.mm-branches{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;width:100%;}
.mm-branch{border-radius:9px;padding:12px 14px;min-width:140px;max-width:200px;flex:1;}
.mm-blabel{font-size:12px;font-weight:600;margin-bottom:7px;}
.mm-child{font-size:11px;color:#6a8a9a;padding:3px 0 3px 8px;border-left:1px solid #1a3a4a;margin-bottom:2px;line-height:1.4;}
.ps-wrap{display:grid;grid-template-columns:1fr 40px 1fr;align-items:stretch;}
.ps-col{padding:14px 16px;border-radius:9px;}
.ps-prob{background:rgba(255,80,80,0.05);border:1px solid rgba(255,80,80,0.15);}
.ps-sol{background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.15);}
.ps-arrow-col{display:flex;align-items:center;justify-content:center;font-size:20px;color:#1a3a4a;}
.ps-label{font-size:9px;font-weight:700;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;margin-bottom:9px;}
.ps-item{font-size:12px;margin-bottom:6px;padding:6px 9px;border-radius:5px;line-height:1.5;display:flex;gap:7px;align-items:flex-start;}
.pc-topic{font-size:12px;color:#4a7a9b;margin-bottom:12px;font-style:italic;}
.pc-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pro-col{background:rgba(0,255,100,0.04);border:1px solid rgba(0,255,100,0.15);border-radius:9px;padding:12px;}
.con-col{background:rgba(255,80,80,0.04);border:1px solid rgba(255,80,80,0.15);border-radius:9px;padding:12px;}
.pc-lbl{font-size:9px;font-weight:700;letter-spacing:2px;margin-bottom:9px;font-family:'IBM Plex Mono',monospace;}
.pc-item{font-size:12px;margin-bottom:6px;padding:6px 9px;border-radius:5px;line-height:1.5;display:flex;gap:7px;}
.pro-item{background:rgba(0,255,100,0.04);color:#c8e8c8;}
.pro-item::before{content:"✓";color:#00ff64;flex-shrink:0;}
.con-item{background:rgba(255,80,80,0.04);color:#ffd8d8;}
.con-item::before{content:"✗";color:#ff5050;flex-shrink:0;}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;}
.cmp-table th{padding:9px 12px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;border-bottom:2px solid #0d1827;}
.cmp-table th:first-child{color:#2a6a7a;}
.cmp-table td{padding:9px 12px;border-bottom:1px solid #0a0d16;}
.cmp-table tr:last-child td{border-bottom:none;}
.cmp-table td:first-child{color:#6a9ab0;font-size:11px;}
.tl-wrap{position:relative;padding-left:18px;}
.tl-wrap::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,#00d4ff,#1a2a3a);border-radius:2px;}
.tl-item{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;position:relative;}
.tl-item:last-child{margin-bottom:0;}
.tl-dot{width:12px;height:12px;border-radius:50%;border:2px solid #00d4ff;background:#07090f;flex-shrink:0;margin-top:3px;position:relative;z-index:1;margin-left:-6px;}
.tl-dot.done{background:#00d4ff;}
.tl-time{font-size:9px;color:#00d4ff;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;margin-bottom:2px;}
.tl-event{font-size:12px;color:#c8d8e8;font-weight:500;line-height:1.4;}
.tl-note{font-size:11px;color:#4a7a9b;margin-top:2px;line-height:1.4;}
.met-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;}
.met-card{padding:16px 14px;background:rgba(255,255,255,0.02);border:1px solid #0d1827;border-radius:9px;text-align:center;}
.met-val{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-bottom:4px;}
.met-name{font-size:9px;color:#4a7a9b;letter-spacing:1px;font-family:'IBM Plex Mono',monospace;}
.met-ctx{font-size:10px;color:#3a6a7a;margin-top:4px;}
.terms-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:9px;}
.term-card{padding:11px 14px;background:rgba(255,217,61,0.04);border:1px solid rgba(255,217,61,0.12);border-radius:7px;}
.term-name{font-size:11px;font-weight:700;color:#ffd93d;font-family:'IBM Plex Mono',monospace;margin-bottom:3px;}
.term-def{font-size:11px;color:#a8a060;line-height:1.5;}
.da-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dec-item{display:flex;gap:9px;align-items:flex-start;padding:8px 11px;border-left:3px solid;border-radius:0 5px 5px 0;margin-bottom:6px;background:rgba(123,156,255,0.04);}
.dec-status{font-size:9px;font-family:'IBM Plex Mono',monospace;font-weight:700;flex-shrink:0;margin-top:2px;}
.dec-text{font-size:11px;color:#a8b8e8;line-height:1.5;}
.act-item{display:flex;gap:9px;align-items:flex-start;padding:8px 11px;background:rgba(38,222,129,0.04);border:1px solid rgba(38,222,129,0.1);border-radius:5px;margin-bottom:5px;}
.act-cb{width:13px;height:13px;border:2px solid #26de81;border-radius:3px;flex-shrink:0;margin-top:2px;}
.act-text{font-size:11px;color:#a0d8b8;line-height:1.5;flex:1;}
.act-owner{font-size:9px;color:#26de8160;font-family:'IBM Plex Mono',monospace;margin-top:2px;}

.empty-sections{padding:20px 28px;display:flex;align-items:center;justify-content:center;flex:1;opacity:0.2;}
.empty-sections p{font-size:11px;color:#4a7a9b;letter-spacing:2px;font-family:'IBM Plex Mono',monospace;text-align:center;line-height:2;}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sb">
    <div class="sb-head">
      <div class="logo">
        <div class="dot"></div>
        <span class="logo-text">LIVE CANVAS</span>
        <span class="live-badge" id="liveBadge">● LIVE</span>
      </div>
      <div class="lbl">ANTHROPIC API KEY</div>
      <input class="api-in" type="password" id="apiKey" placeholder="sk-ant-api03-..." style="margin-bottom:8px"/>
      <div class="lbl">DEEPGRAM API KEY</div>
      <input class="api-in" type="password" id="dgKey" placeholder="your deepgram key..." />
    </div>

    <div class="sb-body">
      <!-- Mic controls -->
      <div class="mic-zone">
        <button class="mic-btn idle" id="micBtn" onclick="toggleMic()">
          <span class="mic-ripple"></span>
          🎙 START LISTENING
        </button>
        <button class="stop-btn" id="stopBtn" onclick="stopMic()">■ STOP SESSION</button>
      </div>

      <!-- Status -->
      <div class="status-bar">
        <div class="status-dot idle" id="statusDot"></div>
        <span class="status-text" id="statusText">READY — CLICK TO START</span>
        <span class="next-update" id="nextUpdate"></span>
      </div>

      <!-- Live transcript -->
      <div class="tx-zone">
        <div class="lbl" style="margin-bottom:8px;flex-shrink:0">LIVE TRANSCRIPT</div>
        <div class="tx-scroll" id="txScroll">
          <span class="tx-placeholder">Transcript will appear here as you speak...</span>
        </div>
      </div>

      <button class="analyze-now" id="analyzeNowBtn" onclick="analyzeNow()" disabled>⚡ ANALYZE NOW</button>
      <div class="err-box" id="errBox"></div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="cv" id="canvas">

    <!-- STICKY TOP: Live Summary -->
    <div class="live-top" id="liveTop">
      <div class="lt-waiting" id="ltWaiting">
        <div class="wi">🎙</div>
        <p>START LISTENING TO SEE<br>YOUR LIVE CANVAS HERE</p>
      </div>
      <div class="lt-content" id="ltContent">
        <div class="lt-topic-row">
          <span class="lt-topic-label">RIGHT NOW</span>
          <div class="lt-topic" id="ltTopic">—</div>
          <span class="lt-updated" id="ltUpdated"></span>
        </div>
        <div class="lt-eli5" id="ltEli5"></div>
        <div class="lt-takeaways" id="ltTakeaways"></div>
        <div class="updating-indicator" id="updatingIndicator">
          <div class="upd-spinner"></div>
          <span class="upd-text">UPDATING...</span>
        </div>
      </div>
    </div>

    <!-- SCROLLABLE DETAIL SECTIONS -->
    <div class="cv-sections" id="cvSections">
      <div class="empty-sections" id="emptySections">
        <p>DETAILED VISUALS WILL APPEAR HERE<br>AS THE MEETING PROGRESSES</p>
      </div>
    </div>

  </div>
</div>

<script>
mermaid.initialize({startOnLoad:false,theme:'dark',securityLevel:'loose'});

// ── STATE ─────────────────────────────────────────────────────────
let dgSocket = null;       // Deepgram WebSocket
let mediaStream = null;    // mic MediaStream
let audioProcessor = null; // ScriptProcessorNode
let audioCtx = null;
let isRecording = false;
let buffer = '';           // full session transcript
let lastAnalyzed = 0;
let lastAnalysisTime = 0;
let analysisInterval = null;
let batchNum = 0;

const ANALYSIS_INTERVAL_MS = 45000; // 2 minutes
const MIN_NEW_WORDS = 20;

// ── MIC ──────────────────────────────────────────────────────────
function toggleMic() {
  if (!isRecording) startMic();
  else stopMic();
}

async function startMic() {
  const antKey = document.getElementById('apiKey').value.trim();
  if (!antKey) { showErr("Enter your Anthropic API key first."); return; }
  const dgKey = document.getElementById('dgKey').value.trim();
  if (!dgKey) { showErr("Enter your Deepgram API key first."); return; }

  hideErr();

  // Get microphone
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    showErr("Microphone permission denied. Please allow mic access."); return;
  }

  // Deepgram WebSocket — key embedded in URL as token param, works in all browsers including Edge
  const dgUrl = `wss://api.deepgram.com/v1/listen?model=nova-3&language=en&smart_format=true&interim_results=true&endpointing=300&encoding=linear16&sample_rate=16000&channels=1`;
  dgSocket = new WebSocket(dgUrl, ['token', dgKey]);

  dgSocket.onopen = () => {
    // Use native AudioContext sample rate, resample to 16kHz before sending
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(mediaStream);
    audioProcessor = audioCtx.createScriptProcessor(2048, 1, 1);
    source.connect(audioProcessor);
    audioProcessor.connect(audioCtx.destination);

    audioProcessor.onaudioprocess = (e) => {
      if (!dgSocket || dgSocket.readyState !== WebSocket.OPEN) return;
      const inputData = e.inputBuffer.getChannelData(0);
      const ratio = audioCtx.sampleRate / 16000;
      const outLen = Math.round(inputData.length / ratio);
      const int16 = new Int16Array(outLen);
      for (let i = 0; i < outLen; i++) {
        const src = inputData[Math.min(Math.round(i * ratio), inputData.length - 1)];
        int16[i] = Math.max(-32768, Math.min(32767, src < 0 ? src * 32768 : src * 32767));
      }
      dgSocket.send(int16.buffer);
    };

    isRecording = true;
    analysisInterval = setInterval(timerTick, 1000);
    lastAnalysisTime = Date.now();
    setUI('recording');
  };

  dgSocket.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (data.type === "Error") { showErr("Deepgram: " + data.description); return; }
      const alt = data?.channel?.alternatives?.[0];
      if (!alt) return;
      const transcript = alt.transcript || '';
      const isFinal = data.is_final;
      if (!transcript) return;

      if (isFinal) {
        const scroll = document.getElementById('txScroll');
        const interim = scroll.querySelector('.tx-interim');
        if (interim) interim.remove();
        buffer += ' ' + transcript;
        appendToTranscript(transcript.trim(), false);
        checkAutoAnalyze();
      } else {
        showInterim(transcript);
      }
    } catch(e) { console.error("DG parse error", e, msg.data); }
  };

  dgSocket.onerror = (e) => {
    console.error("DG socket error", e);
    // Don't show error here — onclose fires right after with the real reason
  };

  dgSocket.onclose = (e) => {
    console.log("DG closed", e.code, e.reason);
    if (e.code === 1006) {
      showErr("Deepgram: connection failed. Check your API key is valid and has credits.");
      isRecording = false; setUI('idle'); return;
    }
    if (e.code === 1008 || e.code === 4001 || e.code === 4010) {
      showErr("Deepgram: invalid API key (code " + e.code + ").");
      isRecording = false; setUI('idle'); return;
    }
    if (isRecording && e.code !== 1000) {
      showErr(`Deepgram disconnected (${e.code}: ${e.reason||'unknown'}). Restarting...`);
      setTimeout(() => { if (isRecording) startMic(); }, 1500);
    }
  };
}

function stopMic() {
  isRecording = false;

  // Close Deepgram
  if (dgSocket) {
    if (dgSocket.readyState === WebSocket.OPEN) {
      dgSocket.send(JSON.stringify({ type: 'CloseStream' }));
    }
    dgSocket.close(1000);
    dgSocket = null;
  }

  // Stop audio pipeline
  if (audioProcessor) { audioProcessor.disconnect(); audioProcessor = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

  if (analysisInterval) { clearInterval(analysisInterval); analysisInterval = null; }
  setUI('idle');

  // Final analysis
  const newContent = buffer.slice(lastAnalyzed).trim();
  if (newContent.split(/\s+/).filter(Boolean).length >= 10) analyze();
}

let countdown = ANALYSIS_INTERVAL_MS / 1000;
function timerTick() {
  const elapsed = (Date.now() - lastAnalysisTime) / 1000;
  const remaining = Math.max(0, Math.round(ANALYSIS_INTERVAL_MS / 1000 - elapsed));
  const newWords = buffer.slice(lastAnalyzed).trim().split(/\s+/).filter(Boolean).length;

  if (remaining <= 0 && newWords >= MIN_NEW_WORDS) {
    lastAnalysisTime = Date.now();
    analyze();
  } else if (newWords >= MIN_NEW_WORDS) {
    document.getElementById('nextUpdate').textContent = `↻ in ${remaining}s`;
  } else {
    document.getElementById('nextUpdate').textContent = newWords > 0 ? `${newWords} words` : '';
  }
}

function checkAutoAnalyze() {
  const newWords = buffer.slice(lastAnalyzed).trim().split(/\s+/).filter(Boolean).length;
  const elapsed = Date.now() - lastAnalysisTime;
  if (newWords >= MIN_NEW_WORDS && elapsed >= ANALYSIS_INTERVAL_MS) {
    lastAnalysisTime = Date.now();
    analyze();
  }
}

function analyzeNow() {
  const newContent = buffer.slice(lastAnalyzed).trim();
  if (newContent.split(/\s+/).filter(Boolean).length < 5) {
    showErr("Not enough new content yet — keep talking!");
    return;
  }
  lastAnalysisTime = Date.now();
  analyze();
}

// ── ANALYSIS ─────────────────────────────────────────────────────
async function analyze() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { showErr("Anthropic API key is missing — paste it in the sidebar before analyzing."); return; }
  const newContent = buffer.slice(lastAnalyzed).trim();
  if (!newContent || newContent.split(/\s+/).filter(Boolean).length < 5) return;

  const analyzedUpTo = buffer.length;
  setAnalyzing(true);
  hideErr();

  // Build context: full session summary + new content
  const context = buffer.length > 2000
    ? `[Earlier context]: ${buffer.slice(0, buffer.length - newContent.length).slice(-600).trim()}\n\n[NEW — analyze this]: ${newContent}`
    : `[Full transcript so far]: ${buffer}`;

  const SYS = `You are a meeting intelligence AI. Analyze this meeting transcript segment and return a JSON canvas.

RESPOND ONLY WITH VALID JSON — no markdown, no backticks.

Schema:
{
  "currentTopic": "What is being discussed RIGHT NOW — 5-8 words",
  "eli5Now": "1-2 plain sentences: what's happening in this meeting right now, for someone who just looked up",
  "takeawaysNow": [
    { "text": "key point from this segment", "highlight": false }
  ],
  "visuals": [ /* 2-4 detail visual sections — pick what fits the new content */ ],
  "decisions": [ { "status": "MADE|PENDING|TABLED", "text": "..." } ],
  "actions": [ { "text": "...", "owner": "" } ]
}

RULES:
- takeawaysNow: 2-4 items, highlight:true on the most important one
- visuals: pick 2-4 from the types below based on what the NEW content contains
  - If process/steps → flowchart
  - If NO process → mindmap AND/OR problemsolution
  - If debate → proscons
  - If options being compared → comparison
  - If dates/schedule → timeline
  - If numbers → metrics
  - If jargon → terms
  - ALWAYS include blindspots
- Every visual needs an "explanation" field with 1-2 sentences of genuine insight

Visual schemas:

"takeaways": { "type":"takeaways","items":[{"text":"...","highlight":false}],"explanation":"..." }
"flowchart": { "type":"flowchart","mermaid":"graph TD\\n  A[X] --> B[Y]","caption":"...","explanation":"..." }
"mindmap": { "type":"mindmap","center":"topic","color":"#26de81","branches":[{"label":"x","children":["y"]}],"explanation":"..." }
"problemsolution": { "type":"problemsolution","problems":["..."],"solutions":["..."],"explanation":"..." }
"proscons": { "type":"proscons","topic":"...","pros":["..."],"cons":["..."],"explanation":"..." }
"comparison": { "type":"comparison","options":["A","B"],"criteria":[{"name":"x","values":["a","b"]}],"explanation":"..." }
"timeline": { "type":"timeline","items":[{"time":"Q1","event":"...","note":"...","done":false}],"explanation":"..." }
"metrics": { "type":"metrics","items":[{"value":"$1M","name":"METRIC","context":"context","color":"#00ff88"}],"explanation":"..." }
"terms": { "type":"terms","items":[{"term":"TERM","definition":"..."}],"explanation":"..." }
"blindspots": { "type":"blindspots","items":[{"question":"...","note":"..."}],"explanation":"..." }`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({
        model:"claude-sonnet-4-5", max_tokens:2500, system:SYS,
        messages:[{role:"user",content:`Analyze this meeting content:\n\n${context}`}]
      })
    });
    const data = await res.json();
    if (data.error) { showErr("API error: "+data.error.message); setAnalyzing(false); return; }
    const raw = data.content?.[0]?.text||"";
    const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());

    lastAnalyzed = analyzedUpTo;
    batchNum++;

    updateLiveTop(parsed);
    await appendDetailSections(parsed, batchNum);

  } catch(e) {
    showErr("Analysis failed: "+e.message);
  }
  setAnalyzing(false);
}

// ── LIVE TOP (sticky summary) ─────────────────────────────────────
function updateLiveTop(d) {
  document.getElementById('ltWaiting').style.display = 'none';
  const ltc = document.getElementById('ltContent');
  ltc.classList.add('visible');
  document.getElementById('liveTop').classList.add('has-content');

  document.getElementById('ltTopic').textContent = d.currentTopic || '—';
  document.getElementById('ltEli5').textContent = d.eli5Now || '';
  document.getElementById('ltUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  const tkEl = document.getElementById('ltTakeaways');
  tkEl.innerHTML = (d.takeawaysNow||[]).map(t =>
    `<span class="lt-tk ${t.highlight?'hl':''}">${t.text}</span>`
  ).join('');
}

// ── DETAIL SECTIONS ───────────────────────────────────────────────
async function appendDetailSections(d, batch) {
  const container = document.getElementById('cvSections');
  const emptyEl = document.getElementById('emptySections');
  if (emptyEl) emptyEl.remove();

  // Timestamp divider
  const ts = document.createElement('div');
  ts.className = 'section-timestamp';
  ts.innerHTML = `<span>UPDATE ${batch} · ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>`;
  container.appendChild(ts);

  // Render visuals
  const visuals = d.visuals || [];
  for (let i = 0; i < visuals.length; i++) {
    const el = document.createElement('div');
    el.innerHTML = await buildSection(visuals[i], i);
    container.appendChild(el.firstElementChild);
    // Smooth stagger
    await new Promise(r => setTimeout(r, 60));
  }

  // Decisions + Actions
  if ((d.decisions||[]).length || (d.actions||[]).length) {
    const el = document.createElement('div');
    el.innerHTML = buildDA(d.decisions||[], d.actions||[]);
    container.appendChild(el.firstElementChild);
  }

  // Scroll to new content
  setTimeout(() => {
    container.lastElementChild?.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 200);
}

// ── UI HELPERS ────────────────────────────────────────────────────
function setUI(state) {
  const btn = document.getElementById('micBtn');
  const stop = document.getElementById('stopBtn');
  const badge = document.getElementById('liveBadge');
  const dot = document.getElementById('statusDot');
  const stxt = document.getElementById('statusText');
  const anow = document.getElementById('analyzeNowBtn');

  if (state === 'recording') {
    btn.className = 'mic-btn recording';
    btn.innerHTML = '<span class="mic-ripple"></span>🎙 LISTENING...';
    stop.classList.add('visible');
    badge.classList.add('active');
    dot.className = 'status-dot listening';
    stxt.textContent = 'LISTENING — SPEAK NATURALLY';
    anow.disabled = false;
  } else {
    btn.className = 'mic-btn idle';
    btn.innerHTML = '<span class="mic-ripple"></span>🎙 START LISTENING';
    stop.classList.remove('visible');
    badge.classList.remove('active');
    dot.className = 'status-dot idle';
    stxt.textContent = 'READY — CLICK TO START';
    document.getElementById('nextUpdate').textContent = '';
    anow.disabled = true;
  }
}

function setAnalyzing(on) {
  const dot = document.getElementById('statusDot');
  const stxt = document.getElementById('statusText');
  const ind = document.getElementById('updatingIndicator');
  if (on) {
    dot.className = 'status-dot analyzing';
    stxt.textContent = 'ANALYZING TRANSCRIPT...';
    ind.classList.add('visible');
  } else {
    dot.className = isRecording ? 'status-dot listening' : 'status-dot idle';
    stxt.textContent = isRecording ? 'LISTENING — SPEAK NATURALLY' : 'READY — CLICK TO START';
    ind.classList.remove('visible');
  }
}

let interimTimeout = null;
function appendToTranscript(text, isInterim) {
  const scroll = document.getElementById('txScroll');
  const placeholder = scroll.querySelector('.tx-placeholder');
  if (placeholder) placeholder.remove();

  // Add timestamp every ~5 minutes
  const now = Date.now();
  if (!window._lastTxTime || now - window._lastTxTime > 300000) {
    window._lastTxTime = now;
    const ts = document.createElement('span');
    ts.className = 'tx-timestamp';
    ts.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    scroll.appendChild(ts);
  }

  const span = document.createElement('span');
  span.className = 'tx-final';
  span.textContent = text + ' ';
  scroll.appendChild(span);
  scroll.scrollTop = scroll.scrollHeight;
}

function showInterim(text) {
  const scroll = document.getElementById('txScroll');
  let interim = scroll.querySelector('.tx-interim');
  if (!interim) {
    interim = document.createElement('span');
    interim.className = 'tx-interim';
    scroll.appendChild(interim);
  }
  interim.textContent = text;
  scroll.scrollTop = scroll.scrollHeight;
}

function showErr(m) { const e=document.getElementById('errBox'); e.textContent=m; e.style.display='block'; }
function hideErr() { document.getElementById('errBox').style.display='none'; }

// ── VISUAL BUILDERS (same as v4) ──────────────────────────────────
const CFG = {
  takeaways:      {icon:'✦',label:'KEY TAKEAWAYS',       color:'#00ff88',bg:'#080f0a'},
  flowchart:      {icon:'⬡',label:'PROCESS FLOW',        color:'#00d4ff',bg:'#080c18'},
  eli5:           {icon:'💡',label:'IN PLAIN ENGLISH',    color:'#c77dff',bg:'#0d0a18'},
  blindspots:     {icon:'⚠',label:'BLIND SPOTS & GAPS',  color:'#ff8c6b',bg:'#110a0a'},
  mindmap:        {icon:'✦',label:'TOPIC MAP',            color:'#26de81',bg:'#080f09'},
  problemsolution:{icon:'⟳',label:'PROBLEM → SOLUTION',  color:'#ff6b9d',bg:'#110810'},
  proscons:       {icon:'⚖',label:'PROS & CONS',          color:'#ff9f43',bg:'#0c0a08'},
  comparison:     {icon:'≡',label:'COMPARISON',           color:'#ff9f43',bg:'#0c0a08'},
  timeline:       {icon:'◈',label:'TIMELINE',             color:'#00d4ff',bg:'#080c10'},
  metrics:        {icon:'◉',label:'KEY METRICS',          color:'#00ffaa',bg:'#08100f'},
  terms:          {icon:'📖',label:'TERMS EXPLAINED',     color:'#ffd93d',bg:'#0a0d08'},
};

async function buildSection(v, i) {
  const cfg = CFG[v.type]||{icon:'▸',label:v.type.toUpperCase(),color:'#4a7a9b',bg:'#0a0d16'};
  const vis = await buildVis(v, cfg);
  const exp = v.explanation ? `<div class="tb"><div class="tb-lbl">WHAT THIS MEANS</div><div class="tb-body">${v.explanation}</div></div>` : '';
  return `<div class="vs" style="animation-delay:${i*0.07}s">
    <div class="vs-head" style="background:${cfg.color}08;border-bottom-color:${cfg.color}15">
      <span class="vs-icon">${cfg.icon}</span>
      <span class="vs-title" style="color:${cfg.color}">${cfg.label}</span>
      <span class="vs-chip" style="background:${cfg.color}15;color:${cfg.color};border:1px solid ${cfg.color}28">${v.type}</span>
    </div>
    <div class="vb" style="background:${cfg.bg}">${vis}</div>
    ${exp}
  </div>`;
}

async function buildVis(v, cfg) {
  switch(v.type) {
    case 'takeaways':
      return (v.items||[]).map(t=>`<div class="tk-row ${t.highlight?'hl':''}"><div class="tk-num" style="${t.highlight?`background:${cfg.color}15;color:${cfg.color}`:''}">✦</div><div class="tk-text">${t.text}</div></div>`).join('');
    case 'flowchart': {
      if(!v.mermaid) return '<p style="color:#4a7a9b;font-size:11px">No diagram.</p>';
      try { const {svg}=await mermaid.render('m'+Date.now(),v.mermaid); return `<div class="diagram-wrap">${svg}</div>${v.caption?`<p class="diagram-cap">${v.caption}</p>`:''}`; }
      catch { return `<pre style="color:#4a7a9b;font-size:10px;padding:10px;background:#060810;border-radius:7px;overflow:auto">${v.mermaid}</pre>`; }
    }
    case 'eli5': return `<div class="eli-body">${v.simple}</div>${v.analogy?`<div class="eli-analogy"><strong>ANALOGY</strong>${v.analogy}</div>`:''}`;
    case 'blindspots': return `<div class="bs-grid">${(v.items||[]).map(b=>`<div class="bs-card"><div class="bs-q">${b.question}</div><div class="bs-a">${b.note}</div></div>`).join('')}</div>`;
    case 'mindmap': {
      const mc=v.color||cfg.color;
      return `<div class="mm-wrap"><div class="mm-center" style="background:${mc}20;border:2px solid ${mc};color:${mc}">${v.center}</div><div class="mm-branches">${(v.branches||[]).map(b=>`<div class="mm-branch" style="background:${mc}08;border:1px solid ${mc}20"><div class="mm-blabel" style="color:${mc}">${b.label}</div>${(b.children||[]).map(c=>`<div class="mm-child">${c}</div>`).join('')}</div>`).join('')}</div></div>`;
    }
    case 'problemsolution': return `<div class="ps-wrap"><div class="ps-col ps-prob"><div class="ps-label" style="color:#ff6060">PROBLEMS</div>${(v.problems||[]).map(p=>`<div class="ps-item" style="background:rgba(255,80,80,0.05);color:#ffd8d8"><span style="color:#ff5050;flex-shrink:0">⚡</span>${p}</div>`).join('')}</div><div class="ps-arrow-col">→</div><div class="ps-col ps-sol"><div class="ps-label" style="color:#00ff88">SOLUTIONS</div>${(v.solutions||[]).map(s=>`<div class="ps-item" style="background:rgba(0,255,136,0.05);color:#c8ffd8"><span style="color:#00ff88;flex-shrink:0">✓</span>${s}</div>`).join('')}</div></div>`;
    case 'proscons': return `${v.topic?`<div class="pc-topic">${v.topic}</div>`:''}<div class="pc-cols"><div class="pro-col"><div class="pc-lbl" style="color:#00ff64">✓ PROS</div>${(v.pros||[]).map(p=>`<div class="pc-item pro-item">${p}</div>`).join('')}</div><div class="con-col"><div class="pc-lbl" style="color:#ff5050">✗ CONS</div>${(v.cons||[]).map(c=>`<div class="pc-item con-item">${c}</div>`).join('')}</div></div>`;
    case 'comparison': return `<div style="overflow-x:auto"><table class="cmp-table"><thead><tr><th>CRITERIA</th>${(v.options||[]).map((o,i)=>`<th style="color:${['#00d4ff','#c77dff','#ff9f43'][i%3]}">${o}</th>`).join('')}</tr></thead><tbody>${(v.criteria||[]).map(r=>`<tr><td>${r.name}</td>${(r.values||[]).map(val=>`<td>${val}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
    case 'timeline': return `<div class="tl-wrap">${(v.items||[]).map(it=>`<div class="tl-item"><div class="tl-dot ${it.done?'done':''}"></div><div><div class="tl-time">${it.time}</div><div class="tl-event">${it.event}</div>${it.note?`<div class="tl-note">${it.note}</div>`:''}</div></div>`).join('')}</div>`;
    case 'metrics': return `<div class="met-grid">${(v.items||[]).map(m=>`<div class="met-card"><div class="met-val" style="color:${m.color||'#00d4ff'}">${m.value}</div><div class="met-name">${m.name}</div>${m.context?`<div class="met-ctx">${m.context}</div>`:''}</div>`).join('')}</div>`;
    case 'terms': return `<div class="terms-grid">${(v.items||[]).map(t=>`<div class="term-card"><div class="term-name">${t.term}</div><div class="term-def">${t.definition}</div></div>`).join('')}</div>`;
    default: return `<p style="color:#4a7a9b;font-size:11px">Visual: ${v.type}</p>`;
  }
}

function buildDA(decisions, actions) {
  if(!decisions.length && !actions.length) return '';
  const dh=decisions.length?`<div><div class="lbl" style="margin-bottom:9px">DECISIONS</div>${decisions.map(d=>{const sc=d.status==='MADE'?'#00ff88':d.status==='PENDING'?'#ffd93d':'#7b9cff';return `<div class="dec-item" style="border-left-color:${sc}"><span class="dec-status" style="color:${sc}">${d.status}</span><span class="dec-text">${d.text}</span></div>`;}).join('')}</div>`:'';
  const ah=actions.length?`<div><div class="lbl" style="margin-bottom:9px">ACTION ITEMS</div>${actions.map(a=>`<div class="act-item"><div class="act-cb"></div><div><div class="act-text">${a.text}</div>${a.owner?`<div class="act-owner">→ ${a.owner}</div>`:''}</div></div>`).join('')}</div>`:'';
  return `<div class="vs"><div class="vs-head" style="background:#7b9cff08;border-bottom-color:#7b9cff15"><span class="vs-icon">⊹</span><span class="vs-title" style="color:#7b9cff">DECISIONS & ACTIONS</span></div><div class="vb" style="background:#09090f"><div class="da-grid">${dh}${ah}</div></div></div>`;
}
